# tests/drivers/dynamixel/prj.conf
CONFIG_LOG=y
CONFIG_ZTEST=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_EMUL=y
CONFIG_UART_EMUL=y
CONFIG_DYNAMIXEL=y
CONFIG_DYNAMIXEL_LOG_LEVEL_DBG=y
# Higher tick resolution so that µs-level timeouts (rxwait_to, packet_timer,
# SYNC/BULK slot gaps) quantise accurately on native_sim's 1 MHz HW clock.
CONFIG_SYS_CLOCK_TICKS_PER_SEC=10000
