name: Zephyr Twister Tests

on:
  pull_request:
  schedule:
    - cron: "0 0 * * SUN" # every sunday
  workflow_dispatch:

jobs:
  format:
    name: clang-format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install clang-format
        run: pip install clang-format

      - name: Check formatting
        shell: bash
        run: |
          set -e
          files=$(git ls-files '*.c' '*.h' | grep -v '^twister-out' || true)
          if [ -z "$files" ]; then
            echo "No C files to check"
            exit 0
          fi
          echo "$files" | xargs clang-format --dry-run --Werror

  build:
    strategy:
      fail-fast: false
      matrix:
#        os: [ubuntu-latest, macos-latest, windows-latest]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          path: zephyr-drivers

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Copy west.yml
        shell: bash
        run: |
          cp zephyr-drivers/.github/west.yml zephyr-drivers/west.yml

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: zephyr-drivers
          toolchains: arm-zephyr-eabi:x86_64-zephyr-elf

      - name: Twister Tests
        working-directory: zephyr-drivers
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXTRA_TWISTER_FLAGS="--short-build-path -O/tmp/twister-out"
          fi
          west twister -T tests -T samples -v --inline-logs --integration $EXTRA_TWISTER_FLAGS
